# -----------------------------------------------------------------------------
# authz-workload: project namespaces + ArgoCD AppProjects (with mirrored roles).
# Deploys to the downstream cluster (where ArgoCD itself runs = in-cluster).
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authz-workload
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: REPO_URL
    targetRevision: TARGET_REVISION
    path: rancher-project-authz
    helm:
      parameters:
        - name: target
          value: workload
  destination:
    server: https://kubernetes.default.svc   # the downstream cluster (in-cluster)
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
