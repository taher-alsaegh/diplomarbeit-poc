# =============================================================================
# Registers the Rancher-local (management) cluster in ArgoCD so authz-management
# can target it. Apply this to the DOWNSTREAM cluster (where ArgoCD runs).
#
# The tricky part in the local Docker setup: ArgoCD pods (in k3d) must REACH the
# Rancher-local API server. Rancher's embedded k3s API is inside the rancher
# container. Options for `server`:
#   - https://host.docker.internal:6443  (if the rancher container publishes 6443)
#   - the rancher container's IP on the shared docker network
# You must also supply valid credentials (token or client cert) for that API.
#
# HOW TO GET THE VALUES:
#   1. Pull the local cluster kubeconfig from Rancher UI:
#      local cluster -> Download KubeConfig  (or from the rancher container:
#      docker exec <rancher> cat /etc/rancher/k3s/k3s.yaml )
#   2. From it, read: server URL, and either the client-cert/key or a token.
#   3. Fill them below. For k3s.yaml you get client-certificate-data +
#      client-key-data (base64). Use the tlsClientConfig block.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: rancher-local-cluster
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
type: Opaque
stringData:
  name: rancher-local
  server: https://host.docker.internal:6443    # adjust to how argo reaches the rancher k3s API
  config: |
    {
      "tlsClientConfig": {
        "insecure": true,
        "certData": "BASE64_CLIENT_CERT",
        "keyData":  "BASE64_CLIENT_KEY"
      }
    }
  # Alternative if you use a bearer token instead of client certs:
  # config: |
  #   {
  #     "bearerToken": "YOUR_TOKEN",
  #     "tlsClientConfig": { "insecure": true }
  #   }
