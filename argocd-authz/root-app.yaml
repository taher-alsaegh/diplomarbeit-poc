# =============================================================================
# App-of-Apps root. Deploy this ONE Application; it discovers and manages the
# child Applications under apps/ (authz-management + authz-workload).
#
# Prereqs:
#   1. rancher-project-authz chart pushed to a git repo ArgoCD can reach
#   2. the Rancher-local (management) cluster registered in ArgoCD
#      (see cluster-secret-rancher-local.yaml)
#
# Replace https://github.com/taher-alsaegh/diplomarbeit-poc.git and main before applying.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authz-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/taher-alsaegh/diplomarbeit-poc.git                 # e.g. https://gitlab.com/you/gitops-authz.git
    targetRevision: main   # e.g. main
    path: argocd-authz/apps           # directory containing the child Applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
