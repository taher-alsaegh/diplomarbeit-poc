{{- $rcb := .Values.renderClusterBindings }}
{{- if kindIs "string" $rcb }}{{- $rcb = (eq $rcb "true") }}{{- end }}
{{- if kindIs "invalid" $rcb }}{{- $rcb = true }}{{- end }}
{{- if and (eq (include "authz.renderManagement" .) "true") $rcb }}
{{- $clusterId := required "clusterId is required" .Values.clusterId -}}
{{- $clusterName := default .Values.clusterId .Values.clusterName -}}
{{- $gp := .Values.groupPrincipalPrefix -}}
{{- $up := .Values.userPrincipalPrefix -}}
{{- range $b := (.Values.clusterBindings | default list) }}
{{- $subject := $b.group | default $b.user }}
---
apiVersion: management.cattle.io/v3
kind: ClusterRoleTemplateBinding
metadata:
  name: {{ include "authz.bindingName" (printf "crtb-%s-%s" $subject $b.role) }}
  namespace: {{ $clusterId }}
  labels:
    {{- include "authz.labels" $ | nindent 4 }}
clusterName: {{ $clusterName }}
roleTemplateName: {{ $b.role }}
{{- if $b.group }}
groupPrincipalName: {{ printf "%s%s" $gp $b.group | quote }}
{{- else if $b.user }}
userPrincipalName: {{ printf "%s%s" $up $b.user | quote }}
{{- end }}
{{- end }}
{{- end }}
