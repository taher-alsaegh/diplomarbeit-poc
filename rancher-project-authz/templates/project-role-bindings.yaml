{{- if eq (include "authz.renderManagement" .) "true" }}
{{- $clusterId := required "clusterId is required" .Values.clusterId -}}
{{- $gp := .Values.groupPrincipalPrefix -}}
{{- $up := .Values.userPrincipalPrefix -}}
{{- range $p := (include "authz.selectedProjects" . | mustFromJson) }}
{{- $bindings := include "authz.effectiveBindings" (dict "project" $p "values" $.Values) | mustFromJson }}
{{- range $b := $bindings }}
{{- $subject := $b.group | default $b.user }}
---
apiVersion: management.cattle.io/v3
kind: ProjectRoleTemplateBinding
metadata:
  name: {{ include "authz.bindingName" (printf "prtb-%s-%s-%s" $p.name $subject $b.role) }}
  namespace: {{ $clusterId }}
  labels:
    {{- include "authz.labels" $ | nindent 4 }}
projectName: {{ printf "%s:%s" $clusterId $p.name | quote }}
roleTemplateName: {{ $b.role }}
{{- if $b.group }}
groupPrincipalName: {{ printf "%s%s" $gp $b.group | quote }}
{{- else if $b.user }}
userPrincipalName: {{ printf "%s%s" $up $b.user | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
